<div class="page">
  <div class="page-header">
    <h1 class="page-title">Settings</h1>
  </div>

  @if (error()) {
    <div class="alert alert-error">
      {{ error() }}
      <button class="alert-close" (click)="error.set(null)">&times;</button>
    </div>
  }

  @if (success()) {
    <div class="alert alert-success">
      {{ success() }}
      <button class="alert-close" (click)="success.set(null)">&times;</button>
    </div>
  }

  <!-- Profile -->
  <section class="settings-section">
    <h2 class="section-title">Profile</h2>
    <div class="settings-card">
      <div class="form-stack">
        <div class="form-group">
          <label>First Name</label>
          <input class="form-input" type="text" placeholder="Your first name"
            [(ngModel)]="firstName" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input class="form-input" type="text" placeholder="Your last name"
            [(ngModel)]="lastName" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" type="text" [value]="profile()?.email" disabled />
          <p class="setting-hint">Email cannot be changed.</p>
        </div>
        <button class="btn-primary" (click)="updateProfile()" [disabled]="loading()">
          {{ loading() ? 'Saving...' : 'Save Profile' }}
        </button>
      </div>
    </div>
  </section>

  <!-- Security -->
  <section class="settings-section">
    <h2 class="section-title">Security</h2>
    <div class="settings-card">
      <h3 class="card-subtitle">Change Password</h3>
      <div class="form-stack">
        <div class="form-group">
          <label>Current Password</label>
          <input class="form-input" type="password" placeholder="••••••••"
            [(ngModel)]="currentPassword" />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input class="form-input" type="password" placeholder="••••••••"
            [(ngModel)]="newPassword" />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input class="form-input" type="password" placeholder="••••••••"
            [(ngModel)]="confirmPassword" />
        </div>
        <button class="btn-primary" (click)="changePassword()" [disabled]="loading() || !currentPassword() || !newPassword()">
          Update Password
        </button>
      </div>
    </div>
  </section>

  <!-- Display -->
  <section class="settings-section">
    <h2 class="section-title">Display</h2>
    <div class="settings-card">
      <div class="setting-row">
        <div>
          <span class="setting-label">Currency</span>
          <p class="setting-hint">Used for portfolio value display</p>
        </div>
        <div class="toggle-group">
          <button class="toggle-btn" [class.active]="currency() === 'USD'" (click)="setCurrency('USD')">USD</button>
          <button class="toggle-btn" [class.active]="currency() === 'EUR'" (click)="setCurrency('EUR')">EUR</button>
        </div>
      </div>
      <div style="margin-top: 1.5rem;">
        <button class="btn-primary" (click)="updateProfile()" [disabled]="loading()">Save Preferences</button>
      </div>
    </div>
  </section>

  <!-- Danger zone -->
  <section class="settings-section">
    <h2 class="section-title section-title--danger">Danger Zone</h2>
    <div class="settings-card settings-card--danger">
      <div class="setting-row">
        <div>
          <span class="setting-label">Delete Account</span>
          <p class="setting-hint">Permanently remove your account and all data. This cannot be undone.</p>
        </div>
        <button class="btn-danger" disabled>Delete Account</button>
      </div>
    </div>
  </section>
</div>

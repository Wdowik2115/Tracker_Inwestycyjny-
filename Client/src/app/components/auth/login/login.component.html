<app-crypto-background></app-crypto-background>

<div class="auth-container">
  <div class="auth-card">
    <div class="logo-section animate-fade-in">
      <div class="logo">
        <svg width="50" height="50" viewBox="0 0 40 40" fill="none">
          <path d="M20 0L25 15L40 20L25 25L20 40L15 25L0 20L15 15L20 0Z" fill="#F5A623"/>
        </svg>
        <h1 class="animate-text-glow">Investee</h1>
      </div>
      <p class="animate-slide-up">Safely Buy, Sell, and Hold Bitcoin, Ethereum, and other assets in one place.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form animate-fade-in-up">
      <h2>Login</h2>

      @if (error()) {
        <div class="error-message">{{ error() }}</div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          Logging in...
        } @else {
          Login
        }
      </button>

      <p class="auth-link">
        Don't have an account? <a routerLink="/register">Register</a>
      </p>
    </form>
  </div>
</div>
